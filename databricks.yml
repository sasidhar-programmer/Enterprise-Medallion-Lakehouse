# ==============================================================================
# BUNDLE: Enterprise Medallion Lakehouse
# DESCRIPTION: Automated Batch Pipeline with Auto-Environment Setup
# ==============================================================================

bundle:
  name: enterprise_medallion_pipeline

resources:
  jobs:
    daily_batch_pipeline:
      name: "Enterprise Daily Batch Pipeline"
      
      # The Ephemeral Hardware Definition (With Safety Limits)
      job_clusters:
        - job_cluster_key: "staff_de_cluster"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 4
            spark_conf:
              "spark.sql.shuffle.partitions": "1024"
              "spark.sql.adaptive.enabled": "true"
              "spark.sql.adaptive.coalescePartitions.enabled": "true"

      # The Directed Acyclic Graph (DAG) Execution Plan
      tasks:
        # STEP 0: Build the Environment (SQL)
        - task_key: "unity_catalog_setup"
          job_cluster_key: "staff_de_cluster"
          notebook_task:
            notebook_path: "./sql/00_unity_catalog_setup.sql"

        # STEP 1: Ingest the Raw Data
        - task_key: "adls_to_bronze"
          depends_on:
            - task_key: "unity_catalog_setup"
          job_cluster_key: "staff_de_cluster"
          notebook_task:
            notebook_path: "./src/bronze/01_ingest_bronze.py"

        # STEP 2A: Cleanse the Heavy Fact Table (Parallel)
        - task_key: "silver_sales"
          depends_on:
            - task_key: "adls_to_bronze"
          job_cluster_key: "staff_de_cluster"
          notebook_task:
            notebook_path: "./src/silver/02_silver_sales.py"

        # STEP 2B: Cleanse the Dimension Catalogs (Parallel)
        - task_key: "silver_dimensions"
          depends_on:
            - task_key: "adls_to_bronze"
          job_cluster_key: "staff_de_cluster"
          notebook_task:
            notebook_path: "./src/silver/02_silver_dimensions.py"

        # STEP 3: Build the Business Dashboards
        - task_key: "gold_business"
          depends_on:
            - task_key: "silver_sales"
            - task_key: "silver_dimensions"
          job_cluster_key: "staff_de_cluster"
          notebook_task:
            notebook_path: "./src/gold/03_gold_aggregations.py"